[colors]
bg_deep   = "#1c1917"
bg        = "#2b2420"
bg_raised = "#3a322c"
fg        = "#e2d9d0"
fg_dim    = "#9a8e82"
border    = "#584e44"
accent    = "#c07850"
success   = "#7a9e6a"
warning   = "#d4a044"
error     = "#c04040"

[font]
family   = "FiraCode Nerd Font"
fallback = "Roboto, Helvetica, Arial, sans-serif"
size     = 13

[spacing]
pad = 8
gap = 16

[window]
border_width = 2
radius       = 10
opacity      = 0.80
bar_alpha    = 0.40
